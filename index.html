<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dots and Boxes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Dots and Boxes</h1>

  <div id="setup">
    <h2>Game Setup</h2>
    <div class="setup-row">
      <label>Player 1 Name:</label>
      <input type="text" id="name1" value="Player 1" maxlength="20">
    </div>
    <div class="setup-row">
      <label>Player 2 (AI) Name:</label>
      <input type="text" id="name2" value="AI" maxlength="20">
    </div>
    <div class="setup-row">
      <label>Grid Size:</label>
      <div id="size-buttons">
        <button class="size-btn" data-size="2">2×2</button>
        <button class="size-btn active" data-size="3">3×3</button>
        <button class="size-btn" data-size="4">4×4</button>
        <button class="size-btn" data-size="5">5×5</button>
        <button class="size-btn" data-size="6">6×6</button>
      </div>
    </div>
    <div class="setup-row">
      <button id="toss-btn">🪙 Coin Toss</button>
      <span id="toss-result"></span>
    </div>
    <button id="start-btn">Start Game</button>
  </div>

  <div id="game-area" style="display:none">
    <p id="score-display">
      <span id="p1-label" class="p1-label">Player 1</span>: <span id="score1">0</span>
      &nbsp;|&nbsp;
      <span id="p2-label" class="p2-label">AI</span>: <span id="score2">0</span>
    </p>
    <p>Current Turn: <span id="current-player-name"></span></p>
    <div id="game-board"></div>
    <button id="reset-btn">New Game</button>
  </div>

  <script src="gameLogic.js"></script>
  <script src="script.js"></script>
</body>
</html>
