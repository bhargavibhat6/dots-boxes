<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dots and Boxes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2196F3">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="favicon.ico">
</head>
<body>

  <button id="hamburger-btn" title="Settings">&#9881;</button>
  <div id="overlay"></div>

  <div id="settings-panel">
    <h2>Settings</h2>
    <div class="setup-row">
      <label>Player 1:</label>
      <input type="text" id="name1" value="Player 1" maxlength="20">
    </div>
    <div class="setup-row">
      <label>Player 2 (Bot):</label>
      <input type="text" id="name2" value="Bot" maxlength="20">
    </div>
    <div class="setup-row">
      <label>Rows:</label>
      <input type="number" id="rows-input" class="grid-input" min="2" max="20" value="6" placeholder="2–20">
      <span class="grid-hint" id="rows-hint">Enter a value between 2 and 20</span>
    </div>
    <div class="setup-row">
      <label>Columns:</label>
      <input type="number" id="cols-input" class="grid-input" min="2" max="20" value="6" placeholder="2–20">
      <span class="grid-hint" id="cols-hint">Enter a value between 2 and 20</span>
    </div>
  </div>

  <h1>Dots and Boxes</h1>

  <div id="game-area">
    <p id="score-display">
      <span id="p1-label" class="p1-label">Player 1</span>: <span id="score1">0</span>
      &nbsp;|&nbsp;
      <span id="p2-label" class="p2-label">Bot</span>: <span id="score2">0</span>
    </p>
    <p>Current Turn: <span id="current-player-name"></span></p>
    <div id="game-board"></div>
    <div id="action-row">
      <button id="toss-btn">&#x1FA99; Coin Toss</button>
      <button id="reset-btn">New Game</button>
    </div>
    <div id="toss-result"></div>
  </div>

  <script src="gameLogic.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/dots-boxes/sw.js');
    }
  </script>
</body>
</html>
